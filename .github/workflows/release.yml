name: release
on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and upload artifacts for
        required: true
        type: string

permissions:
  contents: write

jobs:
  mac-artifacts:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run dist
      - run: gh release upload "$TAG" dist/*.dmg dist/*.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.event.release.tag_name }}

  linux-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: sudo apt-get update && sudo apt-get install -y build-essential python3
      - run: npm ci
      - run: npm run build && npx electron-builder --linux --publish never
      - run: gh release upload "$TAG" dist/*.AppImage dist/*.deb --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
