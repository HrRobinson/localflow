name: release-please
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          release-type: node
          # A PAT (not the default GITHUB_TOKEN) so release-please's release-branch
          # commits trigger the required CI checks. GITHUB_TOKEN-authored commits
          # never run workflows, which deadlocks the release PR against the
          # protect-main required-status-check rules. Branch protection is
          # unchanged — the PAT only authors the release branch, not main.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  # Releases published with GITHUB_TOKEN never fire the `release` event,
  # so call the artifact build directly instead of relying on the trigger.
  artifacts:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
