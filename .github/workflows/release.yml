name: release
on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and upload artifacts for
        required: true
        type: string

permissions:
  contents: write

# One release build per tag/ref at a time. Overlapping runs (a re-dispatch
# while the release-please-triggered run is still uploading) would race the
# `--clobber` uploads; queue them instead. Never cancel-in-progress: a
# half-cancelled release run can leave a release with a partial artifact set.
concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  mac-artifacts:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-node@v7
        with: { node-version: 20, cache: npm }
      - run: npm ci
      # The guard binary is bundled via electron-builder's extraResources
      # (electron-builder.yml) from guard/target/release/saiifeguard, which only
      # a cargo build produces — `npm run build` alone (electron-vite) does
      # not. Without a binary at that path electron-builder logs a
      # non-fatal "file source doesn't exist" warning and ships with no
      # guard binary, silently disabling the command guard in production.
      #
      # This runner is arm64 and builds BOTH mac dmgs (see the comment
      # below), but a plain `npm run build:guard` only produces a
      # host-arch (arm64) binary — the x64 dmg would silently ship an
      # arm64 saiifeguard that can't execute on Intel Macs, failing the guard
      # open on every x64 install. Build both Apple targets and `lipo`
      # them into one universal binary at the same path electron-builder
      # already expects, so both dmgs get a binary that runs natively.
      - run: rustup target add x86_64-apple-darwin aarch64-apple-darwin
      - run: cargo build --release --manifest-path guard/Cargo.toml --target x86_64-apple-darwin --target aarch64-apple-darwin
      - run: lipo -create -output guard/target/release/saiifeguard guard/target/x86_64-apple-darwin/release/saiifeguard guard/target/aarch64-apple-darwin/release/saiifeguard
      # Both mac architectures from the one arm64 runner: electron-builder
      # rebuilds native deps (node-pty) per target arch, and macOS clang
      # cross-compiles x64 on arm64. Artifact names stay distinct — the
      # default template suffixes -arm64 while x64 keeps the bare name — so
      # the dmg/zip upload globs below cover both without clobbering.
      - run: npm run build && npx electron-builder --mac --x64 --arm64 --publish never
      - run: gh release upload "$TAG" dist/*.dmg dist/*.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.event.release.tag_name }}

  linux-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-node@v7
        with: { node-version: 20, cache: npm }
      - run: sudo apt-get update && sudo apt-get install -y build-essential python3
      - run: npm ci
      # See the mac-artifacts job above: build:guard produces the saiifeguard
      # binary that electron-builder's extraResources step bundles.
      - run: npm run build:guard
      - run: npm run build && npx electron-builder --linux --publish never
      - run: gh release upload "$TAG" dist/*.AppImage dist/*.deb --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
